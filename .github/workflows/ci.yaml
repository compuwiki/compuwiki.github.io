name: CI

on:
  pull_request:
    branches:
      - v4

  push:
    branches:
      - v4

  workflow_dispatch:

jobs:
  build-and-test:
    if: ${{ github.repository == 'compuwiki/compuwiki.github.io' }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.13.1
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm version
        run: corepack prepare pnpm@11.1.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check types and style
        run: pnpm run check

      - name: Run tests
        run: pnpm run test

      - name: Ensure Quartz builds
        run: node ./quartz/bootstrap-cli.mjs build --bundleInfo

  publish-tag:
    if: ${{ github.repository == 'compuwiki/compuwiki.github.io' && github.ref == 'refs/heads/v4' }}

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.13.1

      - name: Get package version
        run: |
          echo "PACKAGE_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Create release tag
        uses: pkgdeps/git-tag-action@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_repo: ${{ github.repository }}
          version: ${{ env.PACKAGE_VERSION }}
          git_commit_sha: ${{ github.sha }}
          git_tag_prefix: "v"
