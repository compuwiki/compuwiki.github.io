name: CI

on:
  workflow_dispatch:

jobs:
  build-and-test:
    if: ${{ github.repository == 'compuwiki/compuwiki.github.io' && github.event_name == 'workflow_dispatch' }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.13.1

      - name: Install pnpm
        run: npm install -g pnpm@11.1.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check types and style
        run: pnpm run check

      - name: Run tests
        run: pnpm run test

      - name: Ensure Quartz builds
        run: node ./quartz/bootstrap-cli.mjs build --bundleInfo
